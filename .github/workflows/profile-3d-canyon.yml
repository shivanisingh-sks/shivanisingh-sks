name: GitHub-Profile-3D-Canyon

on:
  schedule:
    - cron: "0 18 * * *" # Runs daily at 18:00 UTC
  workflow_dispatch:      # Allows you to run it manually
  push:
    branches:
      - main              # Runs every time you push to main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-canyon
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: shivanisingh-sks
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Generated 3D Running Canyon"
          git push
